<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/output.css') }}"
    />
  </head>

  <body class="bg-black flex items-center justify-center min-h-screen">
    <div class="w-full max-w-lg">
      <h1 class="text-3xl text-white font-thin mb-2">Iniciar Sesión</h1>

      <h3 class="text-sm text-gray-500 font-extralight mb-2">
        Ingresa tus credenciales para acceder a la aplicación de alarmas.
      </h3>

      {% with messages = get_flashed_messages() %} {% if messages %}
      <ul class="font-thin text-red-800 mb-2">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% endwith %}

      <form method="POST" action="/login" class="space-y-5">
        <label for="username" class="block text-sm font-thin text-white"
          >Usuario:</label
        >

        <input
          type="text"
          id="username"
          name="username"
          required
          placeholder="Escribe tu usuario"
          class="w-full px-4 py-3 font-thin rounded-lg border border-zinc-800 bg-zinc-900 text-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-zinc-900 focus:border-transparent transition-all duration-200 shadow-sm hover:shadow-md"
        />

        <label for="password" class="block text-sm font-thin text-white"
          >Contraseña:</label
        >

        <input
          type="password"
          name="password"
          required
          placeholder="Escribe tu contraseña"
          class="w-full px-4 py-3 font-thin rounded-lg border border-zinc-800 bg-zinc-900 text-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-zinc-900 focus:border-transparent transition-all duration-200 shadow-sm hover:shadow-md"
        />

        <button
          type="submit"
          class="w-full py-3 font-thin bg-red-900 hover:bg-red-700 text-white font-bold rounded-lg transition-colors duration-200 shadow-md mt-2"
        >
          Iniciar Sesión
        </button>
      </form>
      <p class="block text-sm font-extralight text-white mb-2 py-1 mt-2">
        ¿No tienes cuenta?
        <u><a href="/register" class="text-red-900">Regístrate aquí</a></u>
      </p>
    </div>
  </body>
</html>
